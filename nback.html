<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamcore Memory Exploration ☁️🌟</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css">
    <style>
        /* ドリームコア・デザインテーマ */
        body { 
            background: linear-gradient(180deg, #d8eefe 0%, #fdecfd 50%, #fff7d6 100%);
            font-family: 'Hiragino Maru Gothic ProN', sans-serif;
            color: #5b4a8e;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow: hidden;
        }
        .jspsych-content { 
            max-width: 600px;
            background: rgba(255, 255, 255, 0.4);
            padding: 50px;
            border-radius: 60px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
        }
        h1 { color: #8e7cc3; text-shadow: 2px 2px 5px rgba(255,255,255,0.8); }
        .stimulus { 
            font-size: 120px; font-weight: 800; height: 160px; 
            display: flex; align-items: center; justify-content: center; 
            margin: 40px 0; color: #fff;
            text-shadow: 0 0 15px #ffb7c5, 0 0 25px #ffb7c5;
            filter: drop-shadow(4px 4px 0px rgba(142, 124, 195, 0.3));
        }
        .guide { color: #7a6ba8; font-size: 1.1rem; margin-bottom: 20px; letter-spacing: 0.1em; }
        .jspsych-btn { 
            padding: 20px 45px !important; font-size: 1.3rem !important; 
            border-radius: 100px !important; margin: 10px !important; 
            background: rgba(255, 255, 255, 0.7) !important; 
            border: 2px solid #fff !important;
            color: #6a5a9e !important; 
            transition: all 0.5s ease;
        }
        .jspsych-btn:hover { background: #fff !important; transform: scale(1.08); box-shadow: 0 0 20px #e1d5ff; }
        .jspsych-btn-selected { background: #b8a9e0 !important; color: #fff !important; border-color: #fff !important; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 30px; }
        th { background: rgba(184, 169, 224, 0.3); padding: 10px; border-radius: 10px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.5); }
        .correct { color: #7ed6df; font-weight: bold; }
        .incorrect { color: #ff9f43; font-weight: bold; }
    </style>
</head>
<body></body>
<script>
    // データ送信機能付きの初期化
    const jsPsych = initJsPsych({
        on_finish: function() {
            // 画面を送信中に切り替え
            jsPsych.getDisplayElement().innerHTML = '<div style="text-align:center; padding: 50px;"><h2>データを送信中です... ☁️🌟</h2></div>';

            // 不要な行を除外したデータの抽出
            const data = jsPsych.data.get().filter(d => d.condition !== undefined).values();

            // 設定したGAS URL
            const GAS_URL = 'https://script.google.com/macros/s/AKfycbxhH2Ny6DM-dGvemvsWvZef2-yxik30lJYCjsra_jD3UTfwRB9FDnKk9IBytrKdatiSlQ/exec';

            // データ送信
            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(() => {
                // 送信完了メッセージとフィードバック画面の表示
                let html = '<div style="text-align:center;"><h2>実験終了。ご協力ありがとうございました。</h2>';
                html += '<h3>夢の記録 🌟💖</h3><table><tr><th>Lv</th><th>試行</th><th>結果</th></tr>';
                data.forEach(d => {
                    html += `<tr><td>${d.condition}</td><td>${d.trial_index}</td><td class="${d.correct?'correct':'incorrect'}">${d.correct?'正解':'間違い'}</td></tr>`;
                });
                html += '</table></div>';
                jsPsych.getDisplayElement().innerHTML = html;
            })
            .catch(err => {
                console.error(err);
                jsPsych.getDisplayElement().innerHTML = '<h2>送信エラーが発生しました。申し訳ありません。</h2>';
            });
        }
    });

    function generateTrials(nBack) {
        const letters = ['A', 'B', 'C', 'D', 'E'];
        let seq = [];
        for (let i = 0; i < nBack; i++) seq.push(letters[Math.floor(Math.random() * letters.length)]);
        let targets = [];
        let remaining = 20 - nBack;
        let targetIndices = Array.from({length: remaining}, (_, i) => i + nBack);
        targetIndices.sort(() => Math.random() - 0.5);
        let targetPositions = targetIndices.slice(0, 6);
        for (let i = nBack; i < 20; i++) {
            if (targetPositions.includes(i)) {
                seq.push(seq[i - nBack]);
                targets.push(1);
            } else {
                let options = letters.filter(l => l !== seq[i - nBack]);
                seq.push(options[Math.floor(Math.random() * options.length)]);
                targets.push(0);
            }
        }
        return seq.map((char, i) => ({ char: char, isTarget: i < nBack ? 0 : targets[i - nBack] }));
    }

    function createNBackTimeline(nBack, label) {
        let timeline = [];
        generateTrials(nBack).forEach((trial, i) => {
            timeline.push({
                type: jsPsychHtmlButtonResponse,
                stimulus: `
                    <div class="guide">${nBack}-Back 探索中... 🌟</div>
                    <div class="stimulus">${trial.char}</div>
                `,
                choices: ['同じ💖', '違う🌈'],
                button_html: ['<button class="jspsych-btn">同じ💖</button>', '<button class="jspsych-btn">違う🌈</button>'],
                trial_duration: 2000,
                response_ends_trial: false,
                data: { condition: label, trial_index: i + 1, letter: trial.char, isTarget: trial.isTarget },
                on_load: function() {
                    let trialResponse = null;
                    let startTime = performance.now();
                    setTimeout(() => { const stim = document.querySelector('.stimulus'); if(stim) stim.style.visibility = 'hidden'; }, 500);
                    const buttons = document.querySelectorAll('.jspsych-btn');
                    const handle = (idx) => {
                        if(trialResponse !== null) return;
                        trialResponse = idx;
                        buttons.forEach(b => b.classList.remove('jspsych-btn-selected'));
                        buttons[idx].classList.add('jspsych-btn-selected');
                    };
                    buttons.forEach((b, i) => b.addEventListener('click', () => handle(i)));
                    document.addEventListener('keydown', (e) => { const i = (e.key==='f')?0:(e.key==='j')?1:-1; if(i!==-1) handle(i); }, {once: true});
                    jsPsych.getCurrentTrial().getRes = () => trialResponse;
                    jsPsych.getCurrentTrial().getRT = () => Math.round(performance.now() - startTime);
                },
                on_finish: function(data) {
                    const res = jsPsych.getCurrentTrial().getRes();
                    data.response = res;
                    data.rt = jsPsych.getCurrentTrial().getRT();
                    data.correct = (res !== null) && (res === (trial.isTarget ? 0 : 1));
                }
            });
        });
        return timeline;
    }

    const timeline = [
        { type: jsPsychSurveyText, questions: [{ prompt: 'あなたの名前を教えてね ☁️', required: true, name: 'id' }], button_label: 'Start 🌟', on_finish: (d) => jsPsych.data.addProperties({ pid: d.response.id }) },
        { type: jsPsychHtmlButtonResponse, stimulus: '<h1>夢の記憶 🌈</h1><p>1つ前の文字と同じか教えてね。💖</p>', choices: ['はじめる'] },
        ...createNBackTimeline(1, '1-back'),
        { type: jsPsychHtmlButtonResponse, stimulus: '<h1>雲の上の休息 ☁️</h1><p>少し休憩してね。次は2つ前を思い出すよ。🌟</p>', choices: ['つづき'] },
        ...createNBackTimeline(2, '2-back')
    ];

    jsPsych.run(timeline);
</script>
</html>
