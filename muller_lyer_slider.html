<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミュラー・リヤー錯視 調整法実験</title>
  
  <link href="https://cdn.jsdelivr.net/npm/jspsych@7.3.0/css/jspsych.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/jspsych@7.3.0/dist/index.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-canvas-slider-response@1.1.2/dist/index.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-html-button-response@1.1.2/dist/index.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-survey-text@1.1.2/dist/index.browser.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body {
      background: linear-gradient(135deg, #fbcfe8, #d8b4fe, #bae6fd);
      background-attachment: fixed;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }
    
    .jspsych-content {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(15px);
      padding: 2.5rem;
      border-radius: 2rem;
      border: 2px solid white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      width: 95%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    canvas {
      background-color: #ffffff;
      border: 3px solid #fbcfe8;
      border-radius: 1rem;
      margin: 1rem auto;
      display: block;
    }

    .slider-container { width: 100%; max-width: 450px; margin: 0 auto; }

    input[type=range] {
      width: 100%; height: 10px; background: #e9d5ff; border-radius: 9999px;
      appearance: none; cursor: pointer; margin-bottom: 2rem;
    }

    input[type=range]::-webkit-slider-thumb {
      appearance: none; width: 24px; height: 24px; border-radius: 50%;
      background: #c084fc; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    button {
      background: #c084fc !important; color: white !important; border-radius: 9999px !important;
      padding: 0.75rem 2.5rem !important; font-weight: 600 !important; transition: transform 0.2s !important;
    }
  </style>
</head>
<body>
  <div id="jspsych-target"></div>

  <script>
    window.addEventListener('load', function() {
      const jsPsych = initJsPsych({
        display_element: 'jspsych-target',
        on_finish: sendDataToGAS
      });

      const angles = [15, 75]; 
      const lengths = [20, 50]; 
      const repetitions = 3; 
      const totalTrials = angles.length * lengths.length * repetitions;

      let trialsConfig = [];
      for (let a of angles) {
        for (let l of lengths) {
          for (let r = 0; r < repetitions; r++) {
            trialsConfig.push({ angle: a, shaft_length_wing: l });
          }
        }
      }
      trialsConfig = jsPsych.randomization.shuffle(trialsConfig);

      const timeline = [];

      timeline.push({
        type: jsPsychSurveyText,
        questions: [{ prompt: "参加者IDを入力してください", required: true, name: 'subject_id' }],
        button_label: '次へ',
        on_finish: (data) => jsPsych.data.addProperties({ subject_id: data.response.subject_id })
      });

      timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `<h1 class="text-2xl font-bold text-purple-600 mb-4">ミュラー・リヤー錯視実験</h1><p class="text-gray-600">スライダーで下の図を上の図（200px）と同じ長さに調整してね♪</p>`,
        choices: ['実験開始']
      });

      trialsConfig.forEach((config, index) => {
        timeline.push({
          type: jsPsychCanvasSliderResponse,
          stimulus: (c) => drawMullerLyer(c, 250, config.angle, config.shaft_length_wing),
          canvas_size: [350, 500],
          min: 50,
          max: 450,
          slider_start: 250,
          button_label: '決定',
          prompt: `<div class="slider-container"><div class="mb-2 text-purple-500 font-bold text-lg">${index + 1} / ${totalTrials}</div></div>`,
          on_load: function() {
            const slider = document.querySelector('input[type="range"]');
            slider.addEventListener('input', (e) => drawMullerLyer(document.getElementById('jspsych-canvas-stimulus'), e.target.value, config.angle, config.shaft_length_wing));
          },
          on_finish: (data) => { 
            data.timestamp = new Date().toISOString();
            data.pse = data.response;
            data.error_amount = data.response - 200;
          }
        });
      });

      function drawMullerLyer(canvas, val, angle, wLen) {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const mid = canvas.width / 2, rad = angle * Math.PI / 180;
        ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 4; ctx.lineCap = 'round';
        // 標準(200px)
        ctx.beginPath(); ctx.moveTo(mid-100, 100); ctx.lineTo(mid+100, 100); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(mid-100+wLen*Math.cos(rad), 100-wLen*Math.sin(rad)); ctx.lineTo(mid-100, 100); ctx.lineTo(mid-100+wLen*Math.cos(rad), 100+wLen*Math.sin(rad)); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(mid+100-wLen*Math.cos(rad), 100-wLen*Math.sin(rad)); ctx.lineTo(mid+100, 100); ctx.lineTo(mid+100-wLen*Math.cos(rad), 100+wLen*Math.sin(rad)); ctx.stroke();
        // 比較(val)
        ctx.beginPath(); ctx.moveTo(mid-val/2, 250); ctx.lineTo(mid+val/2, 250); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(mid-val/2-wLen*Math.cos(rad), 250-wLen*Math.sin(rad)); ctx.lineTo(mid-val/2, 250); ctx.lineTo(mid-val/2-wLen*Math.cos(rad), 250+wLen*Math.sin(rad)); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(mid+val/2+wLen*Math.cos(rad), 250-wLen*Math.sin(rad)); ctx.lineTo(mid+val/2, 250); ctx.lineTo(mid+val/2+wLen*Math.cos(rad), 250+wLen*Math.sin(rad)); ctx.stroke();
      }

      async function sendDataToGAS() {
        const display = document.getElementById('jspsych-target');
        display.innerHTML = `<h2 class="text-xl text-purple-600">データを送信中...</h2>`;
        
        const data = jsPsych.data.get().filter({trial_type: 'canvas-slider-response'}).values().map(t => ({
          subject_id: t.subject_id, timestamp: t.timestamp, angle: t.angle, wing_length: t.wing, pse: t.pse, error_amount: t.error_amount
        }));

        try {
          const response = await fetch('https://script.google.com/macros/s/AKfycbxTc4zs9_tzptsraf3ZfQuFZjvXQ-7kLTVC1grAaQvVIDKiCD0l7xpwqI-YzHr9onx6LQ/exec', {
            method: 'POST', mode: 'no-cors', body: JSON.stringify(data)
          });
          display.innerHTML = `<h2 class="text-2xl font-bold text-purple-600 mb-4">送信完了！</h2><p>ご協力ありがとうございました♡</p>`;
        } catch(e) {
          display.innerHTML = `<h2 class="text-2xl font-bold text-red-500 mb-4">送信失敗</h2><p>${e.message}</p>`;
        }
      }

      jsPsych.run(timeline);
    });
  </script>
</body>
</html>
