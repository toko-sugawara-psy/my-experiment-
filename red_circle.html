<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jsPsych Red Circle Task</title>
  <!-- jsPsych core and plugins from CDN -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
  <style>
    /* 1. 背景色を灰色 (#808080) に設定 */
    body {
      background-color: #808080;
      color: white;
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* jsPsychのコンテナも背景色を統一し、中央配置を維持 */
    .jspsych-display-element {
      background-color: #808080;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    /* 2. 直径100pxの赤い円をCSSで作成 */
    .red-circle {
      width: 100px;
      height: 100px;
      background-color: #ff0000;
      border-radius: 50%;
      margin: 0 auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.2); /* 視認性のための軽い影 */
    }

    .message {
      font-family: sans-serif;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <script>
    /**
     * jsPsych 仕様実装:
     * 1. 背景色: #808080
     * 2. 中央配置: CSS Flexboxを利用
     * 3. 刺激: 100pxの赤い円 (DIV+CSS)
     * 4. 終了条件: スペースキー
     */

    // jsPsychの初期化
    const jsPsych = initJsPsych();

    const timeline = [];

    // 赤い円を表示する試行
    const circle_trial = {
      type: jsPsychHtmlKeyboardResponse,
      // 2. DIVタグとCSSで円を描画
      stimulus: '<div class="red-circle"></div>',
      // 3. スペースキーが押されるまで表示し続ける
      choices: [' '], 
      prompt: '<p class="message">スペースキーを押して終了してください</p>'
    };
    timeline.push(circle_trial);

    // 4. 終了メッセージの表示
    const end_message = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<p class="message">終了しました。お疲れ様でした。</p>',
      choices: "NO_KEYS",
      trial_duration: 2000 // 2秒間表示して終了
    };
    timeline.push(end_message);

    // 実行
    jsPsych.run(timeline);
  </script>
</body>
</html>
